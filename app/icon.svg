      <stop offset="0%" stop-color="#0b1323" />
      <stop offset="55%" stop-color="#111c31" />
      <stop offset="100%" stop-color="#1a2740" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4b223" />
